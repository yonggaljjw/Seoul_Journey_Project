services:

  frontend:
    build:
      context: frontend/.
      dockerfile: Dockerfile
    env_file :
      - .env
    container_name: service-frontend
    tty: true
    ports:
      - 3000:3000
    volumes:
      - ./frontend:/workspace
      - /workspace/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]

  backend:
    build:
      context: backend/.
      dockerfile: Dockerfile
    env_file :
      - .env
    container_name: service-backend
    tty: true
    ports:
      - 5000:5000
    volumes:
      - ./backend:/workspace
    # command: uvicorn app.main:app --host 0.0.0.0 --reload --log-level debug
    command: ["uv", "run", "gunicorn", "-w", "2", "-b", "0.0.0.0:5000", "--timeout", "120", "run:app", "--reload", "--access-logfile", "-"]