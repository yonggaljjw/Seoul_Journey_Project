name: airflow

# ==============================================================================
# 공통 설정 블록 (x-airflow-common)
# 여러 Airflow 컨테이너에서 공통으로 사용할 설정
# ==============================================================================
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: local/airflow:3.2.0-python3.12-fab
  user: "${AIRFLOW_UID:-50000}:0"

  env_file: .env

  environment: &airflow-common-env
    # --------------------------------------------------------------------------
    # Airflow 핵심 설정
    # --------------------------------------------------------------------------
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"

    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-api-server:8080/execution/"

    # --------------------------------------------------------------------------
    # Metadata DB / Celery 설정
    # --------------------------------------------------------------------------
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: mysql+mysqldb://airflow:airflow@mysql/airflow?charset=utf8mb4
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+mysql://airflow:airflow@mysql/airflow

    # --------------------------------------------------------------------------
    # API 인증
    # --------------------------------------------------------------------------
    AIRFLOW__API_AUTH__JWT_SECRET: "${AIRFLOW_JWT_SECRET:-change-this-to-a-long-random-secret}"
    AIRFLOW__API_AUTH__JWT_ISSUER: "${AIRFLOW_JWT_ISSUER:-airflow}"

    # --------------------------------------------------------------------------
    # 기타
    # --------------------------------------------------------------------------
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    TZ: Asia/Seoul

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
    - ./plugins:/opt/airflow/plugins

# ==============================================================================
# 서비스 정의
# ==============================================================================
services:
  # 1. 메타데이터 DB (MySQL)
  mysql:
    image: mysql:8.0
    container_name: airflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: airflow
      MYSQL_USER: airflow
      MYSQL_PASSWORD: airflow
      TZ: Asia/Seoul
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-db-volume:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # 2. 메시지 브로커 (Redis)
  redis:
    image: redis:7.2-bookworm
    container_name: airflow-redis
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # 3. Airflow 초기화
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        (
          airflow users create \
            --username airflow \
            --firstname Airflow \
            --lastname Admin \
            --role Admin \
            --email airflow@example.com \
            --password airflow \
          || \
          airflow users reset-password \
            --username airflow \
            --password airflow
        )
    restart: "no"

  # 4. Airflow API 서버
  airflow-api-server:
    <<: *airflow-common
    container_name: airflow-api-server
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # 5. Airflow 스케줄러
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-api-server:
        condition: service_healthy
    restart: unless-stopped

  # 6. DAG 프로세서
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type DagProcessorJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-api-server:
        condition: service_healthy
    restart: unless-stopped

  # 7. Airflow 워커
  airflow-worker:
    <<: *airflow-common
    container_name: airflow-worker
    command: celery worker
    environment:
      <<: *airflow-common-env
      # Celery worker 종료 시그널 처리 안정화
      DUMB_INIT_SETSID: "0"
    healthcheck:
      test: ["CMD-SHELL", "celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d \"celery@$${HOSTNAME}\" || celery --app airflow.executors.celery_executor.app inspect ping -d \"celery@$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-api-server:
        condition: service_healthy
    restart: unless-stopped

  # 8. Airflow 트리거러
  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-api-server:
        condition: service_healthy
    restart: unless-stopped

# ==============================================================================
# 볼륨
# ==============================================================================
volumes:
  mysql-db-volume: